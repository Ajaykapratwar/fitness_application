server:
  port: 8083

spring:
  mongodb:
    uri: 
    database: fitnessrecommendation
  rabbitmq:
    exchange:
      name: fitness.exchange
    queue:
      name: activity.queue
    routing:
      key: activity.tracking
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

groq:
  api:
    url: ${GROQ_API_URL}
    key: ${GROQ_API_KEY}
